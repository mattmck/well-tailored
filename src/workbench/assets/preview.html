<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: system-ui; background: #e5e5e5; padding: 40px; display: flex; flex-direction: column; gap: 32px; }
    .card { background: white; border-radius: 16px; padding: 32px; }
    h3 { margin: 0 0 16px; color: #333; }
    .row { display: flex; gap: 32px; align-items: center; flex-wrap: wrap; }
    img { max-height: 200px; }
    .dark { background: #1B2844; padding: 24px; border-radius: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h3>logo-mark.svg (512x512, square with cream bg)</h3>
    <div class="row">
      <img src="logo-mark.svg" width="128" height="128">
      <img src="logo-mark.svg" width="64" height="64">
      <img src="logo-mark.svg" width="32" height="32">
    </div>
  </div>
  <div class="card">
    <h3>logo-primary.svg (mark + text)</h3>
    <img src="logo-primary.svg" height="72">
  </div>
  <div class="card">
    <h3>logo-wordmark.svg (text only)</h3>
    <img src="logo-wordmark.svg" height="48">
  </div>
  <div class="card">
    <h3>favicon.svg (32x32)</h3>
    <div class="row">
      <img src="favicon.svg" width="32" height="32">
      <img src="favicon.svg" width="16" height="16">
    </div>
  </div>
  <div class="card">
    <h3>On dark background</h3>
    <div class="dark row">
      <img src="logo-mark.svg" width="64" height="64">
      <img src="logo-primary.svg" height="48">
    </div>
  </div>
</body>
</html>
